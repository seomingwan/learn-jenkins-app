<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins to S3 배포 테스트</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #2b8a3e;
            margin-bottom: 10px;
        }
        p {
            color: #495057;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            background-color: #12b886;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 CI/CD 배포 완료!</h1>
        <p>Jenkins 파이프라인을 통과하여<br>AWS S3 버킷으로 자동 업로드에 성공했습니다.</p>
        <div class="badge">Connection Success</div>
    </div>
</body>
</html>
